<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF1E2"/>
      <stop offset="100%" stop-color="#F7F4EF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky3)"/>
  <circle cx="650" cy="95" r="42" fill="#FBCB8A"/>
  <rect x="0" y="450" width="800" height="150" fill="#E7E0D2"/>
  <rect x="0" y="450" width="800" height="8" fill="#D8CEBA"/>

  <!-- cottage body -->
  <rect x="260" y="260" width="320" height="190" fill="#FBE9D7" stroke="#D8B98E" stroke-width="2"/>
  <polygon points="245,260 420,170 595,260" fill="#A8513B"/>
  <rect x="404" y="180" width="20" height="44" fill="#A8513B"/>

  <!-- porch -->
  <rect x="200" y="340" width="80" height="110" fill="#FBE9D7" stroke="#D8B98E" stroke-width="2"/>
  <polygon points="190,340 240,300 290,340" fill="#A8513B"/>
  <rect x="208" y="350" width="8" height="100" fill="#8A6A4B"/>
  <rect x="264" y="350" width="8" height="100" fill="#8A6A4B"/>
  <rect x="200" y="436" width="80" height="6" fill="#8A6A4B"/>

  <!-- windows -->
  <rect x="300" y="300" width="62" height="70" fill="#BFE3F0" stroke="#262B36" stroke-width="3"/>
  <line x1="331" y1="300" x2="331" y2="370" stroke="#262B36" stroke-width="2"/>
  <line x1="300" y1="335" x2="362" y2="335" stroke="#262B36" stroke-width="2"/>

  <rect x="480" y="300" width="62" height="70" fill="#BFE3F0" stroke="#262B36" stroke-width="3"/>
  <line x1="511" y1="300" x2="511" y2="370" stroke="#262B36" stroke-width="2"/>
  <line x1="480" y1="335" x2="542" y2="335" stroke="#262B36" stroke-width="2"/>

  <!-- door under porch -->
  <rect x="220" y="380" width="44" height="70" fill="#F47B25"/>
  <circle cx="256" cy="415" r="3" fill="#262B36"/>

  <!-- chimney smoke -->
  <circle cx="418" cy="160" r="6" fill="#E7E0D2" opacity="0.7"/>
  <circle cx="424" cy="148" r="8" fill="#E7E0D2" opacity="0.6"/>

  <!-- shrubs -->
  <circle cx="380" cy="445" r="16" fill="#9CC9A3"/>
  <circle cx="410" cy="448" r="12" fill="#9CC9A3"/>

  <!-- trees -->
  <circle cx="700" cy="370" r="36" fill="#9CC9A3"/>
  <rect x="693" y="395" width="14" height="40" fill="#8A6A4B"/>
  <circle cx="130" cy="280" r="22" fill="#9CC9A3"/>
  <rect x="124" y="296" width="10" height="28" fill="#8A6A4B"/>

  <!-- watermark badge -->
  <g>
    <rect x="600" y="540" width="180" height="42" rx="8" fill="#262B36" opacity="0.88"/>
    <rect x="612" y="551" width="20" height="20" rx="4" fill="#F47B25"/>
    <text x="622" y="566" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ДЮ</text>
    <text x="645" y="566" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff">Дома Юга</text>
  </g>
</svg>
