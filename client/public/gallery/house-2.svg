<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAF2EE"/>
      <stop offset="100%" stop-color="#F7F4EF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky2)"/>
  <circle cx="110" cy="100" r="40" fill="#FBCB8A"/>
  <rect x="0" y="460" width="800" height="140" fill="#DCE3D6"/>
  <rect x="0" y="460" width="800" height="8" fill="#C7D0BE"/>

  <!-- two-story classic house -->
  <rect x="230" y="190" width="340" height="270" fill="#F4EFE6" stroke="#C9BFA9" stroke-width="2"/>
  <polygon points="215,190 400,110 585,190" fill="#5C4A3A"/>
  <rect x="388" y="120" width="22" height="50" fill="#5C4A3A"/>

  <!-- floor divider -->
  <rect x="230" y="320" width="340" height="6" fill="#C9BFA9"/>

  <!-- upper windows -->
  <rect x="270" y="225" width="56" height="64" fill="#BFE3F0" stroke="#262B36" stroke-width="3"/>
  <line x1="298" y1="225" x2="298" y2="289" stroke="#262B36" stroke-width="2"/>
  <line x1="270" y1="257" x2="326" y2="257" stroke="#262B36" stroke-width="2"/>

  <rect x="372" y="225" width="56" height="64" fill="#BFE3F0" stroke="#262B36" stroke-width="3"/>
  <line x1="400" y1="225" x2="400" y2="289" stroke="#262B36" stroke-width="2"/>
  <line x1="372" y1="257" x2="428" y2="257" stroke="#262B36" stroke-width="2"/>

  <rect x="474" y="225" width="56" height="64" fill="#BFE3F0" stroke="#262B36" stroke-width="3"/>
  <line x1="502" y1="225" x2="502" y2="289" stroke="#262B36" stroke-width="2"/>
  <line x1="474" y1="257" x2="530" y2="257" stroke="#262B36" stroke-width="2"/>

  <!-- lower windows -->
  <rect x="270" y="356" width="60" height="72" fill="#BFE3F0" stroke="#262B36" stroke-width="3"/>
  <line x1="300" y1="356" x2="300" y2="428" stroke="#262B36" stroke-width="2"/>
  <line x1="270" y1="392" x2="330" y2="392" stroke="#262B36" stroke-width="2"/>

  <rect x="470" y="356" width="60" height="72" fill="#BFE3F0" stroke="#262B36" stroke-width="3"/>
  <line x1="500" y1="356" x2="500" y2="428" stroke="#262B36" stroke-width="2"/>
  <line x1="470" y1="392" x2="530" y2="392" stroke="#262B36" stroke-width="2"/>

  <!-- door with portico -->
  <rect x="372" y="370" width="56" height="90" fill="#F47B25"/>
  <circle cx="416" cy="415" r="3" fill="#262B36"/>
  <rect x="360" y="350" width="80" height="10" fill="#5C4A3A"/>
  <rect x="364" y="350" width="6" height="20" fill="#5C4A3A"/>
  <rect x="430" y="350" width="6" height="20" fill="#5C4A3A"/>

  <!-- steps -->
  <rect x="362" y="460" width="76" height="8" fill="#C9BFA9"/>

  <!-- trees -->
  <circle cx="660" cy="400" r="38" fill="#8FB89A"/>
  <rect x="653" y="425" width="14" height="40" fill="#7A5A3F"/>
  <circle cx="660" cy="370" r="26" fill="#9CC9A3"/>
  <circle cx="150" cy="420" r="24" fill="#9CC9A3"/>
  <rect x="144" y="438" width="10" height="26" fill="#8A6A4B"/>

  <!-- watermark badge -->
  <g>
    <rect x="600" y="540" width="180" height="42" rx="8" fill="#262B36" opacity="0.88"/>
    <rect x="612" y="551" width="20" height="20" rx="4" fill="#F47B25"/>
    <text x="622" y="566" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ДЮ</text>
    <text x="645" y="566" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff">Дома Юга</text>
  </g>
</svg>
