<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E9ECEF"/>
      <stop offset="100%" stop-color="#F7F4EF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky4)"/>
  <circle cx="120" cy="90" r="38" fill="#FBCB8A"/>
  <rect x="0" y="470" width="800" height="130" fill="#D9D9D6"/>
  <rect x="0" y="470" width="800" height="8" fill="#C7C7C3"/>

  <!-- modern minimalist flat-roof house -->
  <rect x="220" y="270" width="200" height="200" fill="#262B36"/>
  <rect x="420" y="320" width="220" height="150" fill="#FFFFFF" stroke="#D8CEBA" stroke-width="2"/>
  <rect x="210" y="258" width="440" height="14" fill="#1B1F28"/>

  <!-- dark wing windows: full-height strip -->
  <rect x="250" y="300" width="140" height="90" fill="#9FD0E3" opacity="0.9"/>
  <line x1="320" y1="300" x2="320" y2="390" stroke="#1B1F28" stroke-width="3"/>

  <!-- white wing windows -->
  <rect x="450" y="350" width="60" height="60" fill="#BFE3F0" stroke="#262B36" stroke-width="3"/>
  <rect x="540" y="350" width="60" height="60" fill="#BFE3F0" stroke="#262B36" stroke-width="3"/>

  <!-- door -->
  <rect x="240" y="400" width="50" height="70" fill="#F47B25"/>
  <circle cx="280" cy="436" r="3" fill="#1B1F28"/>

  <!-- canopy -->
  <rect x="225" y="392" width="70" height="8" fill="#1B1F28"/>

  <!-- horizontal slats / wood accent -->
  <rect x="420" y="320" width="220" height="10" fill="#C9A37A"/>

  <!-- path -->
  <rect x="245" y="470" width="40" height="14" fill="#C9BFA9"/>

  <!-- minimalist landscaping -->
  <rect x="640" y="440" width="6" height="40" fill="#5C4A3A"/>
  <circle cx="643" cy="420" r="26" fill="#8FB89A"/>
  <circle cx="160" cy="440" r="18" fill="#9CC9A3"/>

  <!-- watermark badge -->
  <g>
    <rect x="600" y="540" width="180" height="42" rx="8" fill="#262B36" opacity="0.88"/>
    <rect x="612" y="551" width="20" height="20" rx="4" fill="#F47B25"/>
    <text x="622" y="566" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ДЮ</text>
    <text x="645" y="566" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff">Дома Юга</text>
  </g>
</svg>
