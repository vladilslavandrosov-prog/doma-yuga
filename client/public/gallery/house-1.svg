<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCEFE0"/>
      <stop offset="100%" stop-color="#F7F4EF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky1)"/>
  <circle cx="690" cy="90" r="46" fill="#FBCB8A"/>
  <rect x="0" y="430" width="800" height="170" fill="#E7E0D2"/>
  <rect x="0" y="430" width="800" height="10" fill="#D8CEBA"/>

  <!-- garage block -->
  <rect x="80" y="320" width="170" height="120" fill="#EDE7DC" stroke="#C9BFA9" stroke-width="2"/>
  <polygon points="70,320 165,270 260,320" fill="#262B36"/>
  <rect x="100" y="370" width="120" height="70" fill="#9CA3AF"/>
  <line x1="130" y1="370" x2="130" y2="440" stroke="#262B36" stroke-width="3"/>
  <line x1="160" y1="370" x2="160" y2="440" stroke="#262B36" stroke-width="3"/>
  <line x1="190" y1="370" x2="190" y2="440" stroke="#262B36" stroke-width="3"/>

  <!-- main house body -->
  <rect x="240" y="230" width="380" height="210" fill="#FFFFFF" stroke="#D8CEBA" stroke-width="2"/>
  <polygon points="225,230 430,140 635,230" fill="#3A4150"/>
  <rect x="420" y="150" width="20" height="40" fill="#3A4150"/>

  <!-- windows -->
  <rect x="280" y="270" width="70" height="80" fill="#BFE3F0" stroke="#262B36" stroke-width="3"/>
  <line x1="315" y1="270" x2="315" y2="350" stroke="#262B36" stroke-width="2"/>
  <line x1="280" y1="310" x2="350" y2="310" stroke="#262B36" stroke-width="2"/>

  <rect x="500" y="270" width="70" height="80" fill="#BFE3F0" stroke="#262B36" stroke-width="3"/>
  <line x1="535" y1="270" x2="535" y2="350" stroke="#262B36" stroke-width="2"/>
  <line x1="500" y1="310" x2="570" y2="310" stroke="#262B36" stroke-width="2"/>

  <!-- door -->
  <rect x="400" y="330" width="60" height="110" fill="#F47B25"/>
  <circle cx="448" cy="388" r="3" fill="#262B36"/>

  <!-- steps -->
  <rect x="390" y="440" width="80" height="10" fill="#C9BFA9"/>

  <!-- trees -->
  <circle cx="690" cy="380" r="34" fill="#9CC9A3"/>
  <rect x="684" y="400" width="12" height="40" fill="#8A6A4B"/>
  <circle cx="120" cy="270" r="26" fill="#9CC9A3"/>
  <rect x="114" y="290" width="10" height="32" fill="#8A6A4B"/>

  <!-- watermark badge -->
  <g>
    <rect x="600" y="540" width="180" height="42" rx="8" fill="#262B36" opacity="0.88"/>
    <rect x="612" y="551" width="20" height="20" rx="4" fill="#F47B25"/>
    <text x="622" y="566" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ДЮ</text>
    <text x="645" y="566" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#fff">Дома Юга</text>
  </g>
</svg>
